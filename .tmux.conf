# ============================================
# GENERAL / ESSENTIAL SETTINGS
# ============================================

# Enable mouse (scroll, resize panes, select windows)
set -g mouse on

# Increase scrollback buffer (more history)
set -g history-limit 50000

# Start window/pane numbering at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1


# ============================================
# APPEARANCE
# ============================================

# Ensure proper color support (important for themes)
set -g default-terminal "xterm-256color"

# Pane border styling
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour240


# ============================================
# KEY BINDINGS
# ============================================

# Change prefix from Ctrl+b → Ctrl+a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes and keep current working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -U
bind k select-pane -D
bind l select-pane -R

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"


# ============================================
# PLUGINS (TPM - Tmux Plugin Manager)
# ============================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence (VERY useful on your Mac)
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Auto-save sessions (can be annoying on shared machines)
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin configuration
set -g @resurrect-strategy-vim 'session'
set -g @continuum-restore 'on'


# ============================================
# 42 MACHINE COMPATIBILITY FIX
# ============================================

# Only run TPM if it exists (prevents errors on fresh machines)
if-shell '[ -d "$HOME/.tmux/plugins/tpm" ]' \
  'run "$HOME/.tmux/plugins/tpm/tpm"' \
  'display-message "TPM not installed (run install script)"'
